<body>
    <div class="centre">
        <a href="index.php" class="logo"><i class='bx bx-pointer bx-rotate-90' ></i><b>QuickBuy</b></a>
    </div>
    <form dir="rtl" method="post" action="createfile.php">
        <h2>إنشاء حساب جديد</h2>
        <label for="username">اسم المستخدم:</label>
        <input type="text" id="username" name="username" required>
        <br><br>
        <label for="email">البريد الإلكتروني:</label>
        <input type="email" id="email" name="email" required>
        <br><br>
        <label for="tel">رقم الهاتف:</label>
        <input type="tel" id="tel" required name="tel">
        <br><br>
        <label for="city">المدينة:</label>
        <input type="text" id="city" required name="city">
        <br><br>
        <label for="password">كلمة المرور:</label>
        <input type="password" id="password" name="password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*]).{8,}" title="يجب أن تحتوي كلمة المرور على الأقل 8 أحرف وأرقام وحروف كبيرة وصغيرة ورموز خاصة (!@#$%^&*)" required><br>
        <i class='bx bx-show password-toggle'  style="color: #fe5b3d; font-size: 20px;" onclick="togglePassword()"></i>
        <br>
        <button type="submit" name="register">متابعة</button>
        <p>هل لديك حساب؟ <a href="sign.html" target="_blank"> تسجيل الدخول</a></p>
    </form>
    <footer>

        </div>  
    </footer>
    <script>
        function togglePassword() {
            var passwordInput = document.getElementById("password");
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
            } else {
                passwordInput.type = "password";
            }
        }
    </script>
