services:
  web:
    build: .
    container_name: quickbuy-web
    ports:
      - "8080:80"
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: quickbuy-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: KHALI@med2000
      MYSQL_DATABASE: e-commerce
    ports:
      - "3307:3306"
    volumes:
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: quickbuy-phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: KHALI@med2000
    depends_on:
      - db

volumes:
  db_data: